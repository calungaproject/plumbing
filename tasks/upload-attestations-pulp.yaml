---
apiVersion: tekton.dev/v1
kind: Task
metadata:
  name: upload-attestations-pulp
spec:
  description: |
    Upload attestations to Pulp for packages that already exist but are
    missing provenance. One-time remediation for the June 24 bulk-upload
    incident.
  params:
    - name: SERVICE_ACCOUNT_SECRET_NAME
      type: string
      description: >-
        The name of the secret containing the terms-based registry service account credentials
      default: rhtl-pulp-credentials-secret
    - name: PULP_BASE_URL
      type: string
      description: The base URL of the Pulp server
    - name: PULP_API_ROOT
      type: string
      description: The API root path of the Pulp server
      default: "/api/"
    - name: PULP_DOMAIN
      type: string
      description: The domain to use for Pulp operations
    - name: PULP_REPOSITORY
      type: string
      description: The Pulp repository to upload to
    - name: sourceDataArtifact
      type: string
      description: Trusted Artifact containing the signed wheels and attestations
    - name: dataDir
      type: string
      description: The location where data will be stored
      default: /var/workdir
    - name: filesDir
      type: string
      description: The relative path within dataDir where wheel files are located
      default: files
    - name: ociArtifactExpiresAfter
      type: string
      description: Expiration date for the trusted artifacts created
      default: "1d"
    - name: orasOptions
      description: oras options to pass to Trusted Artifacts calls
      type: string
      default: ""
    - name: trustedArtifactsDebug
      description: Flag to enable debug logging in trusted artifacts. Set to a non-empty string to enable
      type: string
      default: ""
    - name: taskGitUrl
      type: string
      description: The url to the git repo where the release-service-catalog tasks and stepactions to be used are stored
    - name: taskGitRevision
      type: string
      description: The revision in the taskGitUrl repo to be used
    - name: ociStorage
      type: string
      description: The OCI repository where the Trusted Artifacts are stored
  results:
    - description: Produced trusted data artifact
      name: sourceDataArtifact
      type: string
  volumes:
    - name: service-account-secret
      secret:
        secretName: $(params.SERVICE_ACCOUNT_SECRET_NAME)
    - name: workdir
      emptyDir: {}
  stepTemplate:
    securityContext:
      runAsUser: 1001
    env:
      - name: PULP_BASE_URL
        value: $(params.PULP_BASE_URL)
      - name: PULP_API_ROOT
        value: $(params.PULP_API_ROOT)
      - name: PULP_DOMAIN
        value: $(params.PULP_DOMAIN)
      - name: PULP_REPOSITORY
        value: $(params.PULP_REPOSITORY)
      - name: FILES_DIR
        value: $(params.dataDir)/$(params.filesDir)
      - name: IMAGE_EXPIRES_AFTER
        value: $(params.ociArtifactExpiresAfter)
      - name: "ORAS_OPTIONS"
        value: "$(params.orasOptions)"
      - name: "DEBUG"
        value: "$(params.trustedArtifactsDebug)"
    volumeMounts:
      - name: service-account-secret
        mountPath: "/etc/service-account-secret"
        readOnly: true
      - name: workdir
        mountPath: /var/workdir
  steps:
    - name: prepare-workdir
      image: quay.io/konflux-ci/release-service-utils@sha256:5546fa78d3c88d7b6a2e8cff8902f7757f00541d0bbaf113b9f293133894afa3
      computeResources:
        limits:
          memory: 32Mi
          cpu: 10m
        requests:
          memory: 32Mi
          cpu: 10m
      command:
        - mkdir
        - -p
        - $(params.dataDir)
    - name: use-trusted-artifact
      computeResources:
        limits:
          memory: 64Mi
          cpu: 10m
        requests:
          memory: 64Mi
          cpu: 10m
      ref:
        resolver: "git"
        params:
          - name: url
            value: $(params.taskGitUrl)
          - name: revision
            value: $(params.taskGitRevision)
          - name: pathInRepo
            value: stepactions/use-trusted-artifact/use-trusted-artifact.yaml
      params:
        - name: workDir
          value: $(params.dataDir)
        - name: sourceDataArtifact
          value: $(params.sourceDataArtifact)
    - name: upload-attestations
      image: quay.io/redhat-user-workloads/calunga-tenant/plumbing-utils@sha256:17ac4f8d709b2c69f5a6c01dc53155c421c4216441e18719323291c813d748d0
      script: |
        #!/usr/bin/env bash
        set -euo pipefail
        TWINE_USERNAME=$(< /etc/service-account-secret/username)
        TWINE_PASSWORD=$(< /etc/service-account-secret/password)
        export TWINE_USERNAME TWINE_PASSWORD
        pulp-upload-attestations
      computeResources:
        limits:
          memory: 256Mi
          cpu: 100m
        requests:
          memory: 256Mi
          cpu: 100m
    - name: create-trusted-artifact
      computeResources:
        limits:
          memory: 128Mi
        requests:
          memory: 128Mi
          cpu: 250m
      ref:
        resolver: "git"
        params:
          - name: url
            value: "$(params.taskGitUrl)"
          - name: revision
            value: "$(params.taskGitRevision)"
          - name: pathInRepo
            value: stepactions/create-trusted-artifact/create-trusted-artifact.yaml
      params:
        - name: ociStorage
          value: $(params.ociStorage)
        - name: workDir
          value: $(params.dataDir)
        - name: sourceDataArtifact
          value: $(results.sourceDataArtifact.path)
