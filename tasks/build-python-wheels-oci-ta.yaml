---
apiVersion: tekton.dev/v1
kind: Task
metadata:
  name: build-python-wheels-oci-ta
  annotations:
    tekton.dev/pipelines.minVersion: 0.12.1
    tekton.dev/tags: python, wheels, fromager, konflux
  labels:
    app.kubernetes.io/version: "0.1"
spec:
  description: >-
    Build Python wheels using Fromager and push them as an OCI artifact.

    This task uses Fromager to build Python wheels from source distributions, resolving dependencies automatically. The built wheels are packaged as an OCI artifact and pushed to a registry.
  params:
    - name: PACKAGES
      description: >-
        List of packages to be built. Each is expected to be pinned to a version, e.g. ["urllib3==2.5.0", "numpy==2.3.1"]
      type: array
    - name: IMAGE
      description: Reference of the OCI artifact to be produced.
      type: string
    - name: IMAGE_EXPIRES_AFTER
      description: >-
        Delete image tag after specified time. Empty means to keep the image tag. Time values could be something like 1h, 2d, 3w for hours, days, and weeks, respectively.
      type: string
      default: ""
    - name: SOURCE_ARTIFACT
      description: >-
        The Trusted Artifact URI pointing to the artifact with the application source code.
      type: string
    - name: caTrustConfigMapKey
      description: The name of the key in the ConfigMap that contains the CA bundle data.
      type: string
      default: ca-bundle.crt
    - name: caTrustConfigMapName
      description: The name of the ConfigMap to read CA bundle data from.
      type: string
      default: trusted-ca
    - name: WHEEL_SERVER_URL
      description: Optional wheel server URL for prebuilt wheel lookup
      type: string
      default: ""
    - name: LOCAL_VERSION
      description: >-
        PEP 440 local version identifier to add to the top-level package
        wheels (e.g. 'rhlw' produces pkg-1.0+rhlw). Only applied to
        explicitly requested packages, not their dependencies. Set to
        empty string to disable.
      type: string
      default: "rhlw"
    - name: SERVICE_ACCOUNT_SECRET_NAME
      description: >-
        Name of the K8s secret containing wheel cache server credentials (keys: username, password)
      type: string
      default: builder-service-account
    - name: SCRIPTS_REPO_URL
      description: >-
        Git URL of the plumbing repository containing the build scripts.
        When set, scripts are cloned from this repo instead of using the
        versions baked into the builder image.
      type: string
      default: ""
    - name: SCRIPTS_REPO_REF
      description: >-
        Git ref (branch, tag, or commit SHA) to checkout from SCRIPTS_REPO_URL.
        Only used when SCRIPTS_REPO_URL is non-empty.
      type: string
      default: "main"
    - name: GIT_TOKEN_SECRET_NAME
      description: >-
        Name of the K8s secret containing a Git token for cloning private
        repositories referenced in package specs. The token is read from
        the 'password' key. Set to empty string to disable.
      type: string
      default: ""
  results:
    - name: IMAGE_DIGEST
      description: Digest of the OCI-Artifact just built
    - name: IMAGE_URL
      description: OCI-Artifact repository and tag where the built OCI-Artifact was pushed
    - name: IMAGE_REF
      description: OCI-Artifact reference of the built OCI-Artifact
  volumes:
    - name: trusted-ca
      configMap:
        items:
          - key: $(params.caTrustConfigMapKey)
            path: ca-bundle.crt
        name: $(params.caTrustConfigMapName)
        optional: true
    - name: workdir
      emptyDir: {}
  stepTemplate:
    computeResources:
      limits:
        cpu: "4"
        memory: 4Gi
      requests:
        cpu: "4"
        memory: 4Gi
    volumeMounts:
      - mountPath: /var/workdir
        name: workdir
  steps:
    - name: use-trusted-artifact
      image: quay.io/konflux-ci/build-trusted-artifacts:latest@sha256:2712c8a6453fc9db5fc4c2d9d952554a4eea46d2fdba47a272b79fa07f8c8c40
      args:
        - use
        - $(params.SOURCE_ARTIFACT)=/var/workdir/source
      volumeMounts:
        - mountPath: /etc/pki/tls/certs/ca-custom-bundle.crt
          name: trusted-ca
          readOnly: true
          subPath: ca-bundle.crt
    - name: build-wheels
      image: quay.io/redhat-user-workloads/calunga-tenant/plumbing-builder@sha256:67778fbcd0272b99221fe3086c58a5b5791274a079c3ddd8f978ab0cc0165b95
      workingDir: /var/workdir
      volumeMounts:
        - mountPath: /mnt/trusted-ca
          name: trusted-ca
          readOnly: true
      env:
        - name: SERVICE_ACCOUNT_USERNAME
          valueFrom:
            secretKeyRef:
              name: $(params.SERVICE_ACCOUNT_SECRET_NAME)
              key: username
        - name: SERVICE_ACCOUNT_PASSWORD
          valueFrom:
            secretKeyRef:
              name: $(params.SERVICE_ACCOUNT_SECRET_NAME)
              key: password
        - name: SCRIPTS_REPO_URL
          value: $(params.SCRIPTS_REPO_URL)
        - name: SCRIPTS_REPO_REF
          value: $(params.SCRIPTS_REPO_REF)
        - name: WHEEL_SERVER_URL
          value: $(params.WHEEL_SERVER_URL)
        - name: LOCAL_VERSION
          value: $(params.LOCAL_VERSION)
        - name: GIT_TOKEN
          valueFrom:
            secretKeyRef:
              name: $(params.GIT_TOKEN_SECRET_NAME)
              key: password
              optional: true
      args:
        - $(params.PACKAGES[*])
      script: |
        #!/bin/bash
        set -euo pipefail
        if [ -n "${GIT_TOKEN:-}" ]; then
          git config --global url."https://x-access-token:${GIT_TOKEN}@github.com/".insteadOf "https://github.com/"
        fi
        pip install wheel
        BUILD_WHEELS=build-wheels
        if [ -n "$SCRIPTS_REPO_URL" ]; then
          echo "[$(date --utc -Ins)] Cloning scripts from $SCRIPTS_REPO_URL @ $SCRIPTS_REPO_REF"
          git clone --depth 1 --branch "$SCRIPTS_REPO_REF" "$SCRIPTS_REPO_URL" /tmp/plumbing
          chmod +x /tmp/plumbing/builder/scripts/*
          BUILD_WHEELS=/tmp/plumbing/builder/scripts/build-wheels
        fi
        exec "$BUILD_WHEELS" \
          --cache-wheel-server-url "$WHEEL_SERVER_URL" \
          --local-version "$LOCAL_VERSION" \
          "$@"
    - name: collect-build-files
      image: quay.io/redhat-user-workloads/calunga-tenant/plumbing-builder@sha256:67778fbcd0272b99221fe3086c58a5b5791274a079c3ddd8f978ab0cc0165b95
      command:
        - collect-build-files
      args:
        - /var/workdir/output
        - /var/workdir/artifact
    - name: create-oci-artifact
      image: quay.io/konflux-ci/oras:latest@sha256:1beeecce012c99794568f74265c065839f9703d28306a8430b667f639343a98b
      workingDir: /var/workdir
      volumeMounts:
        - mountPath: /etc/pki/tls/certs/ca-custom-bundle.crt
          name: trusted-ca
          readOnly: true
          subPath: ca-bundle.crt
      env:
        - name: IMAGE
          value: $(params.IMAGE)
        - name: IMAGE_EXPIRES_AFTER
          value: $(params.IMAGE_EXPIRES_AFTER)
      script: |
        #!/bin/bash
        set -euo pipefail

        echo "[$(date --utc -Ins)] Pushing OCI artifact"

        select-oci-auth "$IMAGE" > auth.json
        AUTHFILE="$(realpath auth.json)"

        EXPIRE_LABEL=()
        [ -n "$IMAGE_EXPIRES_AFTER" ] && EXPIRE_LABEL=("--annotation" "quay.expires-after=$IMAGE_EXPIRES_AFTER")

        # Change into artifact directory for proper manifest structure
        cd artifact

        echo "Pushing OCI artifact to ${IMAGE}"
        if ! retry oras push "$IMAGE" \
          --registry-config "${AUTHFILE}" \
          "${EXPIRE_LABEL[@]}" \
          --artifact-type "application/vnd.python.wheels" \
          *
        then
          echo "Failed to push OCI artifact ${IMAGE} to registry"
          exit 1
        fi

        if ! RESULTING_DIGEST=$(retry oras resolve \
          --registry-config "${AUTHFILE}" "${IMAGE}")
        then
          echo "Failed to get digest for ${IMAGE} from registry"
          exit 1
        fi

        echo -n "$IMAGE" | tee "$(results.IMAGE_URL.path)"
        echo -n "$RESULTING_DIGEST" | tee "$(results.IMAGE_DIGEST.path)"
        echo -n "${IMAGE}@${RESULTING_DIGEST}" | tee "$(results.IMAGE_REF.path)"

        echo "[$(date --utc -Ins)] End create-oci-artifact"
      computeResources:
        limits:
          memory: 1Gi
        requests:
          cpu: "1"
          memory: 1Gi
